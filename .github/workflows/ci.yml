name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Linux and macOS exercise the libmtp backend's per-OS library resolution; Windows builds
        # the WPD backend. All three confirm the fake-backed unit tests pass cross-platform. None of
        # the runners has a physical MTP device.
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      # libmtp is the native backend on Linux and macOS and is required to build the binding, so it
      # is installed unconditionally on those jobs; NativeLibMTPLoadTest fails if it cannot load.
      # Windows uses the WPD backend and needs no libmtp.
      - name: Install libmtp (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libmtp9
      - name: Install libmtp (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libmtp

      # The fake-backed unit tests inject a FakeLibMTP and never load native libmtp; the libmtp load
      # smoke test (NativeLibMTPLoadTest) additionally verifies the real library resolves and binds.
      # Integration tests require a physically connected device, so they are not run here; we compile
      # them (integrationTestClasses) only to ensure they don't bit-rot.
      - name: Run unit tests and compile integration tests
        run: ./gradlew test integrationTestClasses

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
